name: Build EXE and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install flask openpyxl pyinstaller --quiet

      - name: EXE 빌드
        run: |
          pyinstaller --onefile --noconsole --name "easydsd" ^
            --hidden-import=openpyxl ^
            --hidden-import=openpyxl.styles ^
            --hidden-import=openpyxl.utils ^
            --hidden-import=flask ^
            --hidden-import=werkzeug ^
            --hidden-import=werkzeug.serving ^
            --hidden-import=werkzeug.routing ^
            --hidden-import=werkzeug.exceptions ^
            --hidden-import=jinja2 ^
            --hidden-import=click ^
            --collect-all=flask ^
            --collect-all=werkzeug ^
            --collect-all=jinja2 ^
            --clean ^
            dart_gui.py
        shell: cmd

      - name: Release에 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          name: "easydsd ${{ github.ref_name }}"
          body: |
            ## easydsd ${{ github.ref_name }}

            ### ⬇️ 다운로드
            아래 **easydsd.exe** 를 클릭해서 다운로드하세요.
            Python 설치 없이 더블클릭만으로 바로 실행됩니다.

            ### 사용 방법
            1. easydsd.exe 다운로드
            2. 더블클릭 → 브라우저 자동 실행
            3. DSD 파일 업로드 → Excel 변환 → 수정 → DSD 재변환

            ### 문의
            eeffco11@naver.com
          files: dist/easydsd.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
